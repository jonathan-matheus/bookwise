services:
  php:
    build: .
    container_name: bookwise-php
    ports:
      - "${PHP_PORT}:80"
    volumes:
      - ../src:/var/www/html
    restart: unless-stopped

  mysql:
    image: mysql:latest
    container_name: bookwise-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - ../mysql-data:/var/lib/mysql
    restart: unless-stopped
